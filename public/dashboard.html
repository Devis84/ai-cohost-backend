<!DOCTYPE html>
<html>
<head>
  <title>AI Co-Host Dashboard</title>
  <meta charset="UTF-8">
</head>

<body>

<h2>📊 Conversations</h2>
<button onclick="loadMessages()">Refresh</button>
<div id="messages"></div>

<h2>🧼 Cleaning Tasks</h2>
<button onclick="loadCleaning()">Refresh</button>
<div id="cleaning"></div>

<h2>➕ Create Booking</h2>

<input id="phone" placeholder="Phone"><br>
<input id="checkin" placeholder="Check-in (YYYY-MM-DD)"><br>
<input id="checkout" placeholder="Check-out (YYYY-MM-DD)"><br>

<button onclick="createBooking()">Create Booking</button>

<script>
async function loadMessages() {
  const res = await fetch("/conversations");
  const data = await res.json();

  document.getElementById("messages").innerHTML =
    data.map(m => `<p><b>${m.phone}</b>: ${m.message}</p>`).join("");
}

async function loadCleaning() {
  const res = await fetch("/cleaning-tasks");
  const data = await res.json();

  document.getElementById("cleaning").innerHTML =
    data.map(c => `<p>🧼 ${c.cleaning_date} - ${c.status}</p>`).join("");
}

async function createBooking() {
  await fetch("/create-booking", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      phone: document.getElementById("phone").value,
      checkin: document.getElementById("checkin").value,
      checkout: document.getElementById("checkout").value
    })
  });
}

loadMessages();
loadCleaning();
</script>

</body>
</html>
